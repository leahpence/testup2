<meta charset="UTF-8">
<title>Channel Menu</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    text-align: center;
    padding: 20px;
}

h1 {
    margin-bottom: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    max-width: 900px;
    margin: auto;
    margin-bottom: 40px;
}

/* Buttons */
button {
    padding: 14px;
    font-size: 15px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #2196f3;
    color: white;
    transition: 0.2s;
}

button:hover {
    background: #1565c0;
}

button.green {
    background: #4caf50;
}

button.green:hover {
    background: #2e7d32;
}

button.yellow {
    background: #ffb300;
}

button.yellow:hover {
    background: #ff8f00;
}

/* EXIT BUTTON */
#exitBtn {
    position: fixed;
    top: 15px;
    right: 15px;
    z-index: 10000;
    background: rgba(229, 9, 20, 0.95);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    cursor: pointer;
    display: none;
}

/* STREAM PLAYER */
#currentStream {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    display: none;
    z-index: 9999;
}

#currentStream iframe {
    width: 100%;
    height: 100%;
    border: none;
}
</style>
</head>

// PLAYER SYSTEM
// =====================
const exitBtn = document.getElementById('exitBtn');
const currentStream = document.getElementById('currentStream');

function playStream(url) {
    currentStream.innerHTML = `<iframe src="${url}" allowfullscreen></iframe>`;
    currentStream.style.display = "block";
    exitBtn.style.display = "block";

    document.getElementById("menu1").style.display = "none";
    document.getElementById("menu2").style.display = "none";
    document.getElementById("menu3").style.display = "none";
}

exitBtn.onclick = () => {
    currentStream.innerHTML = "";
    currentStream.style.display = "none";
    exitBtn.style.display = "none";

    document.getElementById("menu1").style.display = "grid";
    document.getElementById("menu2").style.display = "grid";
    document.getElementById("menu3").style.display = "grid";
};

// RENDER BUTTONS
// =====================

// List 1
const menu1 = document.getElementById("menu1");
channels1.forEach(ch => {
    const btn = document.createElement("button");
    btn.innerText = ch.name.toUpperCase();
    btn.onclick = () => playStream(ch.url);
    menu1.appendChild(btn);
});
